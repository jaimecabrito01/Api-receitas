version: "3.8"

services:

  postgres-db:
    image: postgres:16
    container_name: receitas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: receitas
    ports:
      - "5432:5432"
    volumes:
      - receitas_data:/var/lib/postgresql/data

  spring-app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: spring-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/receitas
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update


  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - spring-app
    


volumes:
  receitas_data:
